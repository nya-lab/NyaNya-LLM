    <text x="154" y="214" text-anchor="middle" class="tick-label">0.05</text>
    <text x="208" y="214" text-anchor="middle" class="tick-label">0.10</text>
    <text x="263" y="214" text-anchor="middle" class="tick-label">0.15</text>
    <text x="317" y="214" text-anchor="middle" class="tick-label">0.20</text>
    <text x="371" y="214" text-anchor="middle" class="tick-label">0.25</text>
    <text x="425" y="214" text-anchor="middle" class="tick-label">0.30</text>

