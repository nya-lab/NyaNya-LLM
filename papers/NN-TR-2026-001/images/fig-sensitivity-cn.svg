<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 11px; font-weight: bold; fill: #222; }
      .axis-label { font-size: 9px; fill: #444; }
      .tick-label { font-size: 8px; fill: #555; }
      .insight { font-size: 7.5px; fill: #555; }
      .subplot-label { font-size: 12px; font-weight: bold; fill: #222; }
      .curve { fill: none; stroke: #3a6b97; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .dot { fill: #3a6b97; stroke: #fff; stroke-width: 1; }
      .dashed { fill: none; stroke: #888; stroke-width: 1.2; stroke-dasharray: 6,4; }
      .grid-line { fill: none; stroke: #e0e0e0; stroke-width: 0.5; }
      .axis-line { fill: none; stroke: #333; stroke-width: 1; }
      .tick { fill: none; stroke: #333; stroke-width: 0.8; }
    </style>
  </defs>

  <!-- White background -->
  <rect width="900" height="550" fill="white"/>

  <!-- ============================================================ -->
  <!-- SUBPLOT (a): α Sensitivity — top-left -->
  <!-- ============================================================ -->
  <g transform="translate(0,0)">
