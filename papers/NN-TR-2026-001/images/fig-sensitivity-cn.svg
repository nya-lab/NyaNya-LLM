    <line x1="208" y1="32" x2="208" y2="202" class="grid-line"/>
    <line x1="263" y1="32" x2="263" y2="202" class="grid-line"/>
    <line x1="317" y1="32" x2="317" y2="202" class="grid-line"/>
    <line x1="371" y1="32" x2="371" y2="202" class="grid-line"/>
