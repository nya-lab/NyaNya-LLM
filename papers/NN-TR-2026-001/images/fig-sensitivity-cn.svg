    <circle cx="154" cy="176.5" r="3" class="dot"/>
    <circle cx="208" cy="159.5" r="4" class="dot" fill="#e74c3c"/>
    <circle cx="263" cy="139.3" r="3" class="dot"/>
    <circle cx="317" cy="114.9" r="3" class="dot"/>
    <circle cx="371" cy="86.2" r="3" class="dot"/>
    <circle cx="425" cy="52.2" r="3" class="dot"/>

