<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .axis-label { fill: #333; font-size: 11px; }
      .tick-label { fill: #555; font-size: 9px; }
      .subplot-title { fill: #222; font-size: 11px; font-weight: bold; }
      .value-label { fill: #333; font-size: 8.5px; }
      .legend-text { fill: #333; font-size: 9px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="white"/>

  <!-- ============================================================ -->
  <!-- SUBPLOT (a): P vs N  (fixed sigma=0.12, D=0.35)             -->
  <!-- Plot area: x=55..270, y=40..310                             -->
  <!-- ============================================================ -->

  <!-- Subplot title -->
  <text x="162" y="20" text-anchor="middle" class="subplot-title">(a) P vs N</text>

  <!-- Subplot conditions -->
  <text x="162" y="33" text-anchor="middle" fill="#888" font-size="8px">σ=0.12, D=0.35</text>

  <!-- Plot border -->
  <rect x="55" y="40" width="215" height="270" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <!-- Y-axis grid lines (horizontal) -->
  <line x1="55" y1="256" x2="270" y2="256" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="55" y1="202" x2="270" y2="202" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="55" y1="148" x2="270" y2="148" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="55" y1="94"  x2="270" y2="94"  stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Y-axis ticks & labels -->
  <line x1="52" y1="310" x2="55" y2="310" stroke="#555" stroke-width="0.5"/>
  <text x="48" y="313" text-anchor="end" class="tick-label">0.8</text>
  <line x1="52" y1="256" x2="55" y2="256" stroke="#555" stroke-width="0.5"/>
  <text x="48" y="259" text-anchor="end" class="tick-label">0.9</text>
  <line x1="52" y1="202" x2="55" y2="202" stroke="#555" stroke-width="0.5"/>
  <text x="48" y="205" text-anchor="end" class="tick-label">1.0</text>
  <line x1="52" y1="148" x2="55" y2="148" stroke="#555" stroke-width="0.5"/>
  <text x="48" y="151" text-anchor="end" class="tick-label">1.1</text>
  <line x1="52" y1="94"  x2="55" y2="94"  stroke="#555" stroke-width="0.5"/>
  <text x="48" y="97"  text-anchor="end" class="tick-label">1.2</text>
  <line x1="52" y1="40"  x2="55" y2="40"  stroke="#555" stroke-width="0.5"/>
  <text x="48" y="43"  text-anchor="end" class="tick-label">1.3</text>

  <!-- X-axis ticks & labels -->
  <line x1="55"  y1="310" x2="55"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="55"  y="325" text-anchor="middle" class="tick-label">0</text>
  <line x1="98"  y1="310" x2="98"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="98"  y="325" text-anchor="middle" class="tick-label">32</text>
  <line x1="141" y1="310" x2="141" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="141" y="325" text-anchor="middle" class="tick-label">64</text>
  <line x1="184" y1="310" x2="184" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="184" y="325" text-anchor="middle" class="tick-label">96</text>
  <line x1="227" y1="310" x2="227" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="227" y="325" text-anchor="middle" class="tick-label">128</text>
  <line x1="270" y1="310" x2="270" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="270" y="325" text-anchor="middle" class="tick-label">160</text>

  <!-- Dashed baseline at P=1.0 -->
  <line x1="55" y1="202" x2="270" y2="202" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Smooth curve: N=32→P=1.0, N=64→P=1.12, N=128→P=1.11 -->
  <!-- Mapped: (98,256) → (141,137) → (227,143) -->
  <path d="M 98,256 C 112,140 126,137 141,137 C 170,137 195,143 227,143"
        fill="none" stroke="#3a6b97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="98"  cy="256" r="3.5" fill="#3a6b97"/>
  <circle cx="141" cy="137" r="3.5" fill="#3a6b97"/>
  <circle cx="227" cy="143" r="3.5" fill="#3a6b97"/>

  <!-- Value labels -->
  <text x="98"  y="250" text-anchor="middle" class="value-label">1.00</text>
  <text x="141" y="127" text-anchor="middle" class="value-label">1.12</text>
  <text x="227" y="133" text-anchor="middle" class="value-label">1.11</text>

  <!-- Optimal zone shading — P>1.0, N>32 -->
  <rect x="98" y="40" width="172" height="162" fill="#3a6b97" opacity="0.06" rx="2"/>
  <text x="184" y="52" text-anchor="middle" class="value-label" fill="#3a6b97" opacity="0.7">Optimal Zone</text>

  <!-- Y-axis label -->
  <text x="20" y="175" text-anchor="middle" class="axis-label" transform="rotate(-90,20,175)">P (Relative Performance)</text>

  <!-- X-axis label -->
  <text x="162" y="342" text-anchor="middle" class="axis-label">N (Active Units)</text>

  <!-- ============================================================ -->
  <!-- SUBPLOT (b): P vs D  (fixed N=32, sigma=0.29)               -->
  <!-- Plot area: x=335..550, y=40..310                            -->
  <!-- ============================================================ -->

  <!-- Subplot title -->
  <text x="442" y="20" text-anchor="middle" class="subplot-title">(b) P vs D</text>

  <!-- Subplot conditions -->
  <text x="442" y="33" text-anchor="middle" fill="#888" font-size="8px">N=32, σ≈0.29</text>

  <!-- Plot border -->
  <rect x="335" y="40" width="215" height="270" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <!-- Y-axis grid lines -->
  <line x1="335" y1="310" x2="550" y2="310" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="335" y1="250" x2="550" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="335" y1="190" x2="550" y2="190" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="335" y1="130" x2="550" y2="130" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="335" y1="70"  x2="550" y2="70"  stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Y-axis ticks & labels -->
  <line x1="332" y1="310" x2="335" y2="310" stroke="#555" stroke-width="0.5"/>
  <text x="328" y="313" text-anchor="end" class="tick-label">0.8</text>
  <line x1="332" y1="250" x2="335" y2="250" stroke="#555" stroke-width="0.5"/>
  <text x="328" y="253" text-anchor="end" class="tick-label">1.0</text>
  <line x1="332" y1="190" x2="335" y2="190" stroke="#555" stroke-width="0.5"/>
  <text x="328" y="193" text-anchor="end" class="tick-label">1.2</text>
  <line x1="332" y1="130" x2="335" y2="130" stroke="#555" stroke-width="0.5"/>
  <text x="328" y="133" text-anchor="end" class="tick-label">1.4</text>
  <line x1="332" y1="70"  x2="335" y2="70"  stroke="#555" stroke-width="0.5"/>
  <text x="328" y="73"  text-anchor="end" class="tick-label">1.6</text>

  <!-- X-axis ticks & labels -->
  <line x1="335"  y1="310" x2="335"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="335"  y="325" text-anchor="middle" class="tick-label">0.2</text>
  <line x1="388.75" y1="310" x2="388.75" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="388.75" y="325" text-anchor="middle" class="tick-label">0.4</text>
  <line x1="442.5" y1="310" x2="442.5" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="442.5" y="325" text-anchor="middle" class="tick-label">0.6</text>
  <line x1="496.25" y1="310" x2="496.25" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="496.25" y="325" text-anchor="middle" class="tick-label">0.8</text>
  <line x1="550"  y1="310" x2="550"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="550"  y="325" text-anchor="middle" class="tick-label">1.0</text>

  <!-- Dashed baseline at P=1.0 -->
  <line x1="335" y1="250" x2="550" y2="250" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Smooth curve: D=0.35→P=1.0, D=0.72→P=1.43, D=0.85→P=1.51 -->
  <!-- Mapped: (375.3,250) → (474.75,121) → (509.7,97) -->
  <path d="M 375.3,250 C 410,120 455,121 474.75,121 C 492,121 498,97 509.7,97"
        fill="none" stroke="#3a6b97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="375.3" cy="250" r="3.5" fill="#3a6b97"/>
  <circle cx="474.75" cy="121" r="3.5" fill="#3a6b97"/>
  <circle cx="509.7" cy="97"  r="3.5" fill="#3a6b97"/>

  <!-- Value labels -->
  <text x="375.3" y="244" text-anchor="middle" class="value-label">1.00</text>
  <text x="486"   y="113" text-anchor="start"  class="value-label">1.43</text>
  <text x="515"   y="89"  text-anchor="start"  class="value-label">1.51</text>

  <!-- Optimal zone shading — P>1.0, D>0.35 -->
  <rect x="375.3" y="40" width="174.7" height="210" fill="#3a6b97" opacity="0.06" rx="2"/>
  <text x="462" y="52" text-anchor="middle" class="value-label" fill="#3a6b97" opacity="0.7">Optimal Zone</text>

  <!-- Y-axis label -->
  <text x="300" y="175" text-anchor="middle" class="axis-label" transform="rotate(-90,300,175)">P (Relative Performance)</text>

  <!-- X-axis label -->
  <text x="442" y="342" text-anchor="middle" class="axis-label">D (Cognitive Diversity)</text>

  <!-- ============================================================ -->
