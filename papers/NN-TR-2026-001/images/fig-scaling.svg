  <!--   Curve 1: N=32, D=0.72   Curve 2: N=64, D=0.85             -->
  <!-- Plot area: x=615..830, y=40..310                            -->
  <!-- ============================================================ -->

  <!-- Subplot title -->
  <text x="722" y="20" text-anchor="middle" class="subplot-title">(c) P vs σ</text>

  <!-- Plot border -->
  <rect x="615" y="40" width="215" height="270" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <!-- Y-axis grid lines -->
  <line x1="615" y1="310"  x2="830" y2="310"  stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="268.5" x2="830" y2="268.5" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="226.9" x2="830" y2="226.9" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="185.4" x2="830" y2="185.4" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="143.8" x2="830" y2="143.8" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="102.3" x2="830" y2="102.3" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="615" y1="60.8"  x2="830" y2="60.8"  stroke="#e0e0e0" stroke-width="0.5"/>

