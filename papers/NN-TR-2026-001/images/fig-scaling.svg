  <!-- Legend -->
  <rect x="635" y="285" width="160" height="30" fill="white" fill-opacity="0.85" rx="2"/>
  <line x1="640" y1="295" x2="658" y2="295" stroke="#3a6b97" stroke-width="1.8"/>
  <circle cx="649" cy="295" r="2.5" fill="#3a6b97"/>
  <text x="663" y="298" class="legend-text">N=32, D=0.72</text>
  <line x1="640" y1="307" x2="658" y2="307" stroke="#5a8a6a" stroke-width="1.8"/>
  <circle cx="649" cy="307" r="2.5" fill="#5a8a6a"/>
  <text x="663" y="310" class="legend-text">N=64, D=0.85</text>

  <!-- Y-axis label -->
  <text x="580" y="175" text-anchor="middle" class="axis-label" transform="rotate(-90,580,175)">P (Relative Performance)</text>

  <!-- X-axis label -->
  <text x="722" y="342" text-anchor="middle" class="axis-label">σ (Conflict Density)</text>

</svg>