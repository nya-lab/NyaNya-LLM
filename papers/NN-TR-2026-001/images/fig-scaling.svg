  <line x1="612" y1="310"  x2="615" y2="310"  stroke="#555" stroke-width="0.5"/>
  <text x="608" y="313"  text-anchor="end" class="tick-label">0.4</text>
  <line x1="612" y1="268.5" x2="615" y2="268.5" stroke="#555" stroke-width="0.5"/>
  <text x="608" y="271.5" text-anchor="end" class="tick-label">0.6</text>
  <line x1="612" y1="226.9" x2="615" y2="226.9" stroke="#555" stroke-width="0.5"/>
  <text x="608" y="229.9" text-anchor="end" class="tick-label">0.8</text>
  <line x1="612" y1="185.4" x2="615" y2="185.4" stroke="#555" stroke-width="0.5"/>
  <text x="608" y="188.4" text-anchor="end" class="tick-label">1.0</text>
  <line x1="612" y1="143.8" x2="615" y2="143.8" stroke="#555" stroke-width="0.5"/>
  <text x="608" y="146.8" text-anchor="end" class="tick-label">1.2</text>
  <line x1="612" y1="102.3" x2="615" y2="102.3" stroke="#555" stroke-width="0.5"/>
  <text x="608" y="105.3" text-anchor="end" class="tick-label">1.4</text>
  <line x1="612" y1="60.8"  x2="615" y2="60.8"  stroke="#555" stroke-width="0.5"/>
  <text x="608" y="63.8"  text-anchor="end" class="tick-label">1.6</text>

  <!-- X-axis ticks & labels -->
  <line x1="615"  y1="310" x2="615"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="615"  y="325" text-anchor="middle" class="tick-label">0.2</text>
  <line x1="668.75" y1="310" x2="668.75" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="668.75" y="325" text-anchor="middle" class="tick-label">0.4</text>
  <line x1="722.5" y1="310" x2="722.5" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="722.5" y="325" text-anchor="middle" class="tick-label">0.6</text>
  <line x1="776.25" y1="310" x2="776.25" y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="776.25" y="325" text-anchor="middle" class="tick-label">0.8</text>
  <line x1="830"  y1="310" x2="830"  y2="313" stroke="#555" stroke-width="0.5"/>
  <text x="830"  y="325" text-anchor="middle" class="tick-label">1.0</text>

  <!-- Dashed baseline at P=1.0 -->
  <line x1="615" y1="185.4" x2="830" y2="185.4" stroke="#999" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Optimal zone shading — P>1.0 for low sigma -->
  <rect x="615" y="40" width="91" height="145.4" fill="#3a6b97" opacity="0.06" rx="2"/>
  <text x="660" y="52" text-anchor="middle" class="value-label" fill="#3a6b97" opacity="0.7">Optimal Zone</text>

  <!-- Curve 1: N=32, D=0.72  (sigma=0.30→P=1.43, sigma=0.75→P=0.61) -->
  <!-- Mapped: (641.9,96.1) → (762.8,266.4) -->
  <path d="M 641.9,96.1 C 690,100 720,260 762.8,266.4"
        fill="none" stroke="#3a6b97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Curve 1 data points -->
  <circle cx="641.9" cy="96.1"  r="3.5" fill="#3a6b97"/>
  <circle cx="762.8" cy="266.4" r="3.5" fill="#3a6b97"/>

  <!-- Curve 1 value labels -->
  <text x="630" y="90"  text-anchor="end" class="value-label">1.43</text>
  <text x="762.8" y="276" text-anchor="middle" class="value-label">0.61</text>

  <!-- Curve 2: N=64, D=0.85  (sigma=0.28→P=1.51, sigma=0.82→P=0.54) -->
  <!-- Mapped: (636.5,79.5) → (781.6,280.9) -->
  <path d="M 636.5,79.5 C 688,84 743,275 781.6,280.9"
        fill="none" stroke="#5a8a6a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Curve 2 data points -->
