<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="white"/>

  <!-- Main figure title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Figure 4: Ablation Study Results</text>

  <!-- ============================================================ -->
  <!-- Subplot 1: Coordination Latency (top-left) -->
  <!-- ============================================================ -->
  <g transform="translate(0,0)">
    <!-- Subplot bounding box -->
    <rect x="60" y="50" width="320" height="205" fill="none" stroke="#ddd" stroke-width="1"/>

    <!-- Subplot title -->
    <text x="220" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Coordination Latency (ms)</text>

    <!-- Y-axis line -->
    <line x1="100" y1="75" x2="100" y2="235" stroke="#333" stroke-width="1"/>

    <!-- Y-axis ticks and labels -->
    <!-- Range: 100–150, ticks at 100, 110, 120, 130, 140, 150 -->
    <!-- Plot height: 160, from y=75 to y=235 -->
    <line x1="96" y1="235" x2="100" y2="235" stroke="#333" stroke-width="1"/>
    <text x="92" y="239" text-anchor="end" font-size="8" fill="#555">100</text>
    <line x1="98" y1="235" x2="380" y2="235" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="203" x2="100" y2="203" stroke="#333" stroke-width="1"/>
    <text x="92" y="207" text-anchor="end" font-size="8" fill="#555">110</text>
    <line x1="98" y1="203" x2="380" y2="203" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="171" x2="100" y2="171" stroke="#333" stroke-width="1"/>
    <text x="92" y="175" text-anchor="end" font-size="8" fill="#555">120</text>
    <line x1="98" y1="171" x2="380" y2="171" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="139" x2="100" y2="139" stroke="#333" stroke-width="1"/>
    <text x="92" y="143" text-anchor="end" font-size="8" fill="#555">130</text>
    <line x1="98" y1="139" x2="380" y2="139" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="107" x2="100" y2="107" stroke="#333" stroke-width="1"/>
    <text x="92" y="111" text-anchor="end" font-size="8" fill="#555">140</text>
    <line x1="98" y1="107" x2="380" y2="107" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="75" x2="100" y2="75" stroke="#333" stroke-width="1"/>
    <text x="92" y="79" text-anchor="end" font-size="8" fill="#555">150</text>

    <!-- Bars: 5 bars, 30px wide, gap 26px, centered in [100,380] (280px) -->
    <!-- Total width: 5*30 + 4*26 = 254px, start at 100 + (280-254)/2 = 113 -->
    <!-- Bar centers: 128, 184, 240, 296, 352 -->

    <!-- Data: 112.3, 145.6, 110.2, 109.8, 108.7 -->
    <!-- Scale: y = 235 - (value - 100) / 50 * 160 -->
    <!-- 112.3: h=39.4, y=195.6 -->  <!-- 145.6: h=145.9, y=89.1 -->  <!-- 110.2: h=32.6, y=202.4 -->  <!-- 109.8: h=31.4, y=203.6 -->  <!-- 108.7: h=27.8, y=207.2 -->

    <!-- Bar 1: w/o CCL -->
    <rect x="113" y="195.6" width="30" height="39.4" fill="#c0d0e0" rx="1"/>
    <text x="128" y="193" text-anchor="middle" font-size="7.5" fill="#444">112.3</text>

    <!-- Bar 2: w/o NLB -->
    <rect x="169" y="89.1" width="30" height="145.9" fill="#c0d0e0" rx="1"/>
    <text x="184" y="86.5" text-anchor="middle" font-size="7.5" fill="#444">145.6</text>

    <!-- Bar 3: w/o RES Guard -->
    <rect x="225" y="202.4" width="30" height="32.6" fill="#c0d0e0" rx="1"/>
    <text x="240" y="199.8" text-anchor="middle" font-size="7.5" fill="#444">110.2</text>

    <!-- Bar 4: w/o ACI -->
    <rect x="281" y="203.6" width="30" height="31.4" fill="#c0d0e0" rx="1"/>
    <text x="296" y="201" text-anchor="middle" font-size="7.5" fill="#444">109.8</text>

    <!-- Bar 5: Full OCML -->
    <rect x="337" y="207.2" width="30" height="27.8" fill="#3a6b97" rx="1"/>
    <text x="352" y="204.6" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#3a6b97">108.7</text>

    <!-- X-axis labels -->
    <text x="128" y="248" text-anchor="middle" font-size="8" fill="#555">w/o CCL</text>
    <text x="184" y="248" text-anchor="middle" font-size="8" fill="#555">w/o NLB</text>
    <text x="240" y="248" text-anchor="middle" font-size="8" fill="#555">w/o RES</text>
    <text x="296" y="248" text-anchor="middle" font-size="8" fill="#555">w/o ACI</text>
    <text x="352" y="248" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a6b97">Full OCML</text>
  </g>

  <!-- ============================================================ -->
  <!-- Subplot 2: CHC Bias Rate (top-right) -->
  <!-- ============================================================ -->
  <g transform="translate(0,0)">
    <rect x="420" y="50" width="320" height="205" fill="none" stroke="#ddd" stroke-width="1"/>

    <text x="580" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">CHC Bias Rate (%)</text>

    <line x1="460" y1="75" x2="460" y2="235" stroke="#333" stroke-width="1"/>

    <!-- Range: 0–25, ticks at 0, 5, 10, 15, 20, 25 -->
    <line x1="456" y1="235" x2="460" y2="235" stroke="#333" stroke-width="1"/>
    <text x="452" y="239" text-anchor="end" font-size="8" fill="#555">0</text>
    <line x1="458" y1="235" x2="740" y2="235" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="203" x2="460" y2="203" stroke="#333" stroke-width="1"/>
    <text x="452" y="207" text-anchor="end" font-size="8" fill="#555">5</text>
    <line x1="458" y1="203" x2="740" y2="203" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="171" x2="460" y2="171" stroke="#333" stroke-width="1"/>
    <text x="452" y="175" text-anchor="end" font-size="8" fill="#555">10</text>
    <line x1="458" y1="171" x2="740" y2="171" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="139" x2="460" y2="139" stroke="#333" stroke-width="1"/>
    <text x="452" y="143" text-anchor="end" font-size="8" fill="#555">15</text>
    <line x1="458" y1="139" x2="740" y2="139" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="107" x2="460" y2="107" stroke="#333" stroke-width="1"/>
    <text x="452" y="111" text-anchor="end" font-size="8" fill="#555">20</text>
    <line x1="458" y1="107" x2="740" y2="107" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="75" x2="460" y2="75" stroke="#333" stroke-width="1"/>
    <text x="452" y="79" text-anchor="end" font-size="8" fill="#555">25</text>

    <!-- Data: 14.2, 6.4, 6.1, 19.6, 5.8 -->
    <!-- Scale: y = 235 - value / 25 * 160 -->
    <!-- 14.2: h=90.9, y=144.1 -->  <!-- 6.4: h=41.0, y=194.0 -->  <!-- 6.1: h=39.0, y=196.0 -->  <!-- 19.6: h=125.4, y=109.6 -->  <!-- 5.8: h=37.1, y=197.9 -->

    <rect x="473" y="144.1" width="30" height="90.9" fill="#c0d0e0" rx="1"/>
    <text x="488" y="141.5" text-anchor="middle" font-size="7.5" fill="#444">14.2</text>

    <rect x="529" y="194.0" width="30" height="41.0" fill="#c0d0e0" rx="1"/>
    <text x="544" y="191.4" text-anchor="middle" font-size="7.5" fill="#444">6.4</text>

    <rect x="585" y="196.0" width="30" height="39.0" fill="#c0d0e0" rx="1"/>
    <text x="600" y="193.4" text-anchor="middle" font-size="7.5" fill="#444">6.1</text>

    <rect x="641" y="109.6" width="30" height="125.4" fill="#c0d0e0" rx="1"/>
    <text x="656" y="107" text-anchor="middle" font-size="7.5" fill="#444">19.6</text>

    <rect x="697" y="197.9" width="30" height="37.1" fill="#3a6b97" rx="1"/>
    <text x="712" y="195.3" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#3a6b97">5.8</text>

    <text x="488" y="248" text-anchor="middle" font-size="8" fill="#555">w/o CCL</text>
    <text x="544" y="248" text-anchor="middle" font-size="8" fill="#555">w/o NLB</text>
    <text x="600" y="248" text-anchor="middle" font-size="8" fill="#555">w/o RES</text>
    <text x="656" y="248" text-anchor="middle" font-size="8" fill="#555">w/o ACI</text>
    <text x="712" y="248" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a6b97">Full OCML</text>
  </g>

  <!-- ============================================================ -->
