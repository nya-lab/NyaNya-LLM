    <line x1="98" y1="428" x2="380" y2="428" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="396" x2="100" y2="396" stroke="#333" stroke-width="1"/>
    <text x="92" y="400" text-anchor="end" font-size="8" fill="#555">20</text>
    <line x1="98" y1="396" x2="380" y2="396" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="364" x2="100" y2="364" stroke="#333" stroke-width="1"/>
    <text x="92" y="368" text-anchor="end" font-size="8" fill="#555">30</text>
    <line x1="98" y1="364" x2="380" y2="364" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="332" x2="100" y2="332" stroke="#333" stroke-width="1"/>
    <text x="92" y="336" text-anchor="end" font-size="8" fill="#555">40</text>
    <line x1="98" y1="332" x2="380" y2="332" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

