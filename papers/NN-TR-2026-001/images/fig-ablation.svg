    <text x="92" y="464" text-anchor="end" font-size="8" fill="#555">0</text>
    <line x1="98" y1="460" x2="380" y2="460" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="96" y1="428" x2="100" y2="428" stroke="#333" stroke-width="1"/>
