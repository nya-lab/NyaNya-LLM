    <text x="92" y="304" text-anchor="end" font-size="8" fill="#555">50</text>

    <!-- Data: 15.8, 16.1, 44.8, 15.2, 14.6 -->
    <!-- Scale: y = 460 - value / 50 * 160 -->
    <!-- 15.8: h=50.6, y=409.4 -->  <!-- 16.1: h=51.5, y=408.5 -->  <!-- 44.8: h=143.4, y=316.6 -->  <!-- 15.2: h=48.6, y=411.4 -->  <!-- 14.6: h=46.7, y=413.3 -->

    <rect x="113" y="409.4" width="30" height="50.6" fill="#c0d0e0" rx="1"/>
    <text x="128" y="406.8" text-anchor="middle" font-size="7.5" fill="#444">15.8</text>

    <rect x="169" y="408.5" width="30" height="51.5" fill="#c0d0e0" rx="1"/>
    <text x="184" y="405.9" text-anchor="middle" font-size="7.5" fill="#444">16.1</text>

    <rect x="225" y="316.6" width="30" height="143.4" fill="#c0d0e0" rx="1"/>
    <text x="240" y="314" text-anchor="middle" font-size="7.5" fill="#444">44.8</text>

    <rect x="281" y="411.4" width="30" height="48.6" fill="#c0d0e0" rx="1"/>
    <text x="296" y="408.8" text-anchor="middle" font-size="7.5" fill="#444">15.2</text>

    <rect x="337" y="413.3" width="30" height="46.7" fill="#3a6b97" rx="1"/>
    <text x="352" y="410.7" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#3a6b97">14.6</text>

    <text x="128" y="473" text-anchor="middle" font-size="8" fill="#555">w/o CCL</text>
    <text x="184" y="473" text-anchor="middle" font-size="8" fill="#555">w/o NLB</text>
    <text x="240" y="473" text-anchor="middle" font-size="8" fill="#555">w/o RES</text>
    <text x="296" y="473" text-anchor="middle" font-size="8" fill="#555">w/o ACI</text>
    <text x="352" y="473" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a6b97">Full OCML</text>
  </g>

  <!-- ============================================================ -->
  <!-- Subplot 4: Semantic Integrity (bottom-right) -->
  <!-- ============================================================ -->
  <g transform="translate(0,0)">
    <rect x="420" y="275" width="320" height="205" fill="none" stroke="#ddd" stroke-width="1"/>

    <text x="580" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Semantic Integrity (%)</text>

    <line x1="460" y1="300" x2="460" y2="460" stroke="#333" stroke-width="1"/>

    <!-- Range: 70–95, ticks at 70, 75, 80, 85, 90, 95 -->
    <line x1="456" y1="460" x2="460" y2="460" stroke="#333" stroke-width="1"/>
    <text x="452" y="464" text-anchor="end" font-size="8" fill="#555">70</text>
    <line x1="458" y1="460" x2="740" y2="460" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="428" x2="460" y2="428" stroke="#333" stroke-width="1"/>
    <text x="452" y="432" text-anchor="end" font-size="8" fill="#555">75</text>
    <line x1="458" y1="428" x2="740" y2="428" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="396" x2="460" y2="396" stroke="#333" stroke-width="1"/>
    <text x="452" y="400" text-anchor="end" font-size="8" fill="#555">80</text>
    <line x1="458" y1="396" x2="740" y2="396" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="364" x2="460" y2="364" stroke="#333" stroke-width="1"/>
    <text x="452" y="368" text-anchor="end" font-size="8" fill="#555">85</text>
    <line x1="458" y1="364" x2="740" y2="364" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

    <line x1="456" y1="332" x2="460" y2="332" stroke="#333" stroke-width="1"/>
    <text x="452" y="336" text-anchor="end" font-size="8" fill="#555">90</text>
    <line x1="458" y1="332" x2="740" y2="332" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

