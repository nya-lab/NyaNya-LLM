    <!-- Scale: y = 460 - (value - 70) / 25 * 160 -->
    <!-- 88.7: h=119.7, y=340.3 -->  <!-- 78.2: h=52.5, y=407.5 -->  <!-- 90.5: h=131.2, y=328.8 -->  <!-- 90.8: h=133.1, y=326.9 -->  <!-- 91.4: h=137.0, y=323.0 -->

    <rect x="473" y="340.3" width="30" height="119.7" fill="#c0d0e0" rx="1"/>
    <text x="488" y="337.7" text-anchor="middle" font-size="7.5" fill="#444">88.7</text>

    <rect x="529" y="407.5" width="30" height="52.5" fill="#c0d0e0" rx="1"/>
    <text x="544" y="404.9" text-anchor="middle" font-size="7.5" fill="#444">78.2</text>

    <rect x="585" y="328.8" width="30" height="131.2" fill="#c0d0e0" rx="1"/>
    <text x="600" y="326.2" text-anchor="middle" font-size="7.5" fill="#444">90.5</text>

    <rect x="641" y="326.9" width="30" height="133.1" fill="#c0d0e0" rx="1"/>
    <text x="656" y="324.3" text-anchor="middle" font-size="7.5" fill="#444">90.8</text>

    <rect x="697" y="323.0" width="30" height="137.0" fill="#3a6b97" rx="1"/>
    <text x="712" y="320.4" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#3a6b97">91.4</text>

    <text x="488" y="473" text-anchor="middle" font-size="8" fill="#555">w/o CCL</text>
    <text x="544" y="473" text-anchor="middle" font-size="8" fill="#555">w/o NLB</text>
    <text x="600" y="473" text-anchor="middle" font-size="8" fill="#555">w/o RES</text>
    <text x="656" y="473" text-anchor="middle" font-size="8" fill="#555">w/o ACI</text>
    <text x="712" y="473" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a6b97">Full OCML</text>
