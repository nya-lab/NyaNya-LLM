  <g transform="translate(0,0)">
    <rect x="60" y="275" width="320" height="205" fill="none" stroke="#ddd" stroke-width="1"/>

    <text x="220" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Compute Waste (%)</text>

    <line x1="100" y1="300" x2="100" y2="460" stroke="#333" stroke-width="1"/>

