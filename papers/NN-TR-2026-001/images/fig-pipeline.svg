<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#4a7ba7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="#ffffff"/>

  <!-- ===== Input Q ===== -->
  <rect x="40" y="32" width="36" height="28" rx="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="58" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a2a3a">Q</text>

  <!-- Arrow: Q → Split -->
  <line x1="76" y1="46" x2="88" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 1: Split ===== -->
  <rect x="90" y="25" width="106" height="42" rx="6" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="143" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a2a3a">Split</text>

  <!-- Arrow: Split → Flow -->
  <line x1="196" y1="46" x2="212" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: Flow ===== -->
  <rect x="214" y="25" width="106" height="42" rx="6" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="267" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a2a3a">Flow</text>

  <!-- Arrow: Flow → Field -->
  <line x1="320" y1="46" x2="336" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: Field ===== -->
  <rect x="338" y="25" width="106" height="42" rx="6" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="391" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a2a3a">Field</text>

  <!-- Arrow: Field → Merge -->
  <line x1="444" y1="46" x2="460" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 4: Merge ===== -->
  <rect x="462" y="25" width="106" height="42" rx="6" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="515" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a2a3a">Merge</text>

  <!-- Arrow: Merge → Speak -->
  <line x1="568" y1="46" x2="584" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 5: Speak ===== -->
  <rect x="586" y="25" width="106" height="42" rx="6" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="639" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a2a3a">Speak</text>

  <!-- Arrow: Speak → Output -->
  <line x1="692" y1="46" x2="708" y2="46" stroke="#4a7ba7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Output ===== -->
  <rect x="710" y="32" width="50" height="28" rx="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.5"/>
  <text x="735" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#1a2a3a">Output</text>

  <!-- ===== Stage Descriptions ===== -->
  <text x="143" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a5a6a">Semantic Decomposition / Constraint Extraction</text>
  <text x="267" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a5a6a">Dynamic Routing / Load Balancing</text>
  <text x="391" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a5a6a">Semantic Field / OSU Propagation</text>
  <text x="515" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a5a6a">Consensus Compression / Conflict Resolution</text>
  <text x="639" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#4a5a6a">NL Generation / Multimodal Output</text>

  <!-- ===== Dashed guide lines from stages to LAXI ===== -->
  <line x1="143" y1="67" x2="143" y2="205" stroke="#5a8a6a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="267" y1="67" x2="267" y2="205" stroke="#5a8a6a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="391" y1="67" x2="391" y2="205" stroke="#5a8a6a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="515" y1="67" x2="515" y2="205" stroke="#5a8a6a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="639" y1="67" x2="639" y2="205" stroke="#5a8a6a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- ===== LAXI Bar ===== -->
  <rect x="50" y="188" width="700" height="30" rx="6" fill="#eaf0e8" stroke="#5a8a6a" stroke-width="1.5"/>
  <text x="400" y="207" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#1a2a3a">LAXI: Full-Chain Anomaly Monitoring &amp; Semantic Recovery</text>
</svg>