<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="none" stroke="#2c5f8a" stroke-width="1.2"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2c5f8a" stroke-width="1.2"/>
    </marker>
    <marker id="arrowRightThin" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4a7ba7" stroke-width="1"/>
    </marker>
    <marker id="arrowDownThin" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="none" stroke="#4a7ba7" stroke-width="1"/>
    </marker>
    <!-- Drop shadow for layer containers -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1a2a3a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- ============================================================ -->
  <!-- LAYER 1: 群体共识协议 (Consensus Protocol) -->
  <!-- ============================================================ -->
  <rect x="20" y="24" width="580" height="140" rx="6" ry="6"
        fill="#f0f4f8" stroke="#4a7ba7" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>

  <!-- Layer 1 title -->
  <text x="38" y="48" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1a2a3a">
    群体共识协议
  </text>
  <text x="200" y="48" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#6a8a9a">
    · 共识协议
  </text>

  <!-- Pipeline boxes -->
  <!-- Split -->
  <rect x="38" y="68" width="85" height="38" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="80.5" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2c5f8a" text-anchor="middle">Split</text>

  <!-- Arrow Split → Flow -->
  <line x1="127" y1="87" x2="151" y2="87" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- Flow -->
  <rect x="155" y="68" width="85" height="38" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="197.5" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2c5f8a" text-anchor="middle">Flow</text>

  <!-- Arrow Flow → Field -->
  <line x1="244" y1="87" x2="268" y2="87" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- Field -->
  <rect x="272" y="68" width="85" height="38" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="314.5" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2c5f8a" text-anchor="middle">Field</text>

  <!-- Arrow Field → Merge -->
  <line x1="361" y1="87" x2="385" y2="87" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- Merge -->
  <rect x="389" y="68" width="85" height="38" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="431.5" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2c5f8a" text-anchor="middle">Merge</text>

  <!-- Arrow Merge → Speak -->
  <line x1="478" y1="87" x2="502" y2="87" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- Speak -->
  <rect x="506" y="68" width="85" height="38" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="548.5" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2c5f8a" text-anchor="middle">Speak</text>

  <!-- Pipeline subtitle -->
  <text x="38" y="128" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" font-style="italic">
    五阶段反馈流水线：Split → Flow → Field → Merge → Speak
  </text>

  <!-- Down arrow from Layer 1 to Layer 2 -->
  <line x1="310" y1="168" x2="310" y2="185" stroke="#4a7ba7" stroke-width="1.2" marker-end="url(#arrowDownThin)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: 有机认知代谢层 OCML -->
  <!-- ============================================================ -->
  <rect x="20" y="190" width="580" height="160" rx="6" ry="6"
        fill="#f0f4f8" stroke="#4a7ba7" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>

  <!-- Layer 2 title -->
  <text x="38" y="214" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1a2a3a">
    有机认知代谢层 OCML
  </text>
  <text x="290" y="214" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#6a8a9a">
    · OCML　有机认知代谢层
  </text>

  <!-- 5 subsystem boxes -->
  <!-- BCW -->
  <rect x="30" y="234" width="100" height="56" rx="4" ry="4" fill="#e8eef4" stroke="#2c5f8a" stroke-width="1.3"/>
  <text x="80" y="255" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2c5f8a" text-anchor="middle">BCW</text>
  <text x="80" y="273" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" text-anchor="middle">置信度加权</text>

  <!-- CCL -->
  <rect x="140" y="234" width="100" height="56" rx="4" ry="4" fill="#e8eef4" stroke="#2c5f8a" stroke-width="1.3"/>
  <text x="190" y="255" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2c5f8a" text-anchor="middle">CCL</text>
  <text x="190" y="273" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" text-anchor="middle">认知约束</text>

  <!-- NLB -->
  <rect x="250" y="234" width="100" height="56" rx="4" ry="4" fill="#e8eef4" stroke="#2c5f8a" stroke-width="1.3"/>
  <text x="300" y="255" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2c5f8a" text-anchor="middle">NLB</text>
  <text x="300" y="273" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" text-anchor="middle">自然语言桥接</text>

  <!-- MCP -->
  <rect x="360" y="234" width="100" height="56" rx="4" ry="4" fill="#e8eef4" stroke="#2c5f8a" stroke-width="1.3"/>
  <text x="410" y="255" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2c5f8a" text-anchor="middle">MCP</text>
  <text x="410" y="273" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" text-anchor="middle">多通道处理</text>

  <!-- LAXI -->
  <rect x="470" y="234" width="100" height="56" rx="4" ry="4" fill="#e8eef4" stroke="#2c5f8a" stroke-width="1.3"/>
  <text x="520" y="255" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2c5f8a" text-anchor="middle">LAXI</text>
  <text x="520" y="273" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" text-anchor="middle">公理接口</text>

  <!-- Interconnection arrows between OCML subsystems -->
  <line x1="130" y1="262" x2="140" y2="262" stroke="#4a7ba7" stroke-width="0.8" marker-end="url(#arrowRightThin)"/>
  <line x1="240" y1="262" x2="250" y2="262" stroke="#4a7ba7" stroke-width="0.8" marker-end="url(#arrowRightThin)"/>
  <line x1="350" y1="262" x2="360" y2="262" stroke="#4a7ba7" stroke-width="0.8" marker-end="url(#arrowRightThin)"/>
  <line x1="460" y1="262" x2="470" y2="262" stroke="#4a7ba7" stroke-width="0.8" marker-end="url(#arrowRightThin)"/>

  <!-- Layer 2 subtitle -->
  <text x="38" y="314" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" font-style="italic">
    五个子系统：置信度加权 · 认知约束 · 自然语言桥接 · 多通道处理 · 公理接口
  </text>

  <!-- Down arrow from Layer 2 to Layer 3 -->
  <line x1="310" y1="354" x2="310" y2="371" stroke="#4a7ba7" stroke-width="1.2" marker-end="url(#arrowDownThin)"/>

  <!-- ============================================================ -->
  <!-- LAYER 3: 碳基神经织物 CBNF -->
  <!-- ============================================================ -->
  <rect x="20" y="376" width="580" height="140" rx="6" ry="6"
        fill="#f0f4f8" stroke="#4a7ba7" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>

  <!-- Layer 3 title -->
  <text x="38" y="400" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1a2a3a">
    碳基神经织物 CBNF
  </text>
  <text x="250" y="400" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#6a8a9a">
    · CBNF　碳基神经织物
  </text>

  <!-- OPU Cluster -->
  <rect x="50" y="422" width="220" height="46" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="160" y="442" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#2c5f8a" text-anchor="middle">OPU 集群</text>
  <text x="160" y="458" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6a8a9a" text-anchor="middle">含 BigXS</text>

  <!-- Arrow between OPU and OSU -->
  <line x1="274" y1="445" x2="320" y2="445" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <!-- OSU Semantic Carriers -->
  <rect x="324" y="422" width="220" height="46" rx="4" ry="4" fill="#e8eef4" stroke="#3a6b97" stroke-width="1.2"/>
  <text x="434" y="442" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#2c5f8a" text-anchor="middle">OSU 语义载体</text>
  <text x="434" y="458" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6a8a9a" text-anchor="middle">语义存储与路由</text>

  <!-- Layer 3 subtitle -->
  <text x="38" y="494" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6a8a9a" font-style="italic">
    物理计算层：OPU 算子单元集群 + OSU 语义存储单元，支撑上层认知代谢
  </text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: 配套运维校验体系 -->
  <!-- ============================================================ -->
  <rect x="622" y="24" width="160" height="492" rx="6" ry="6"
        fill="#f0f4f8" stroke="#4a7ba7" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>

  <!-- Infrastructure title -->
  <text x="702" y="48" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1a2a3a" text-anchor="middle">
    配套运维校验体系
  </text>
  <text x="702" y="64" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#6a8a9a" text-anchor="middle">
    配套运维体系
  </text>

  <!-- Thin separator line -->
  <line x1="638" y1="74" x2="766" y2="74" stroke="#4a7ba7" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- BEW Pool -->
  <rect x="638" y="88" width="128" height="42" rx="4" ry="4" fill="#eaf0ea" stroke="#5a8a6a" stroke-width="1.2"/>
  <text x="702" y="106" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#5a8a6a" text-anchor="middle">BEW Pool</text>
  <text x="702" y="121" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7a9a8a" text-anchor="middle">信念池</text>

  <!-- Down arrow -->
  <line x1="702" y1="134" x2="702" y2="152" stroke="#5a8a6a" stroke-width="0.8" marker-end="url(#arrowDownThin)"/>

  <!-- RES Guard -->
  <rect x="638" y="156" width="128" height="42" rx="4" ry="4" fill="#eaf0ea" stroke="#5a8a6a" stroke-width="1.2"/>
  <text x="702" y="174" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#5a8a6a" text-anchor="middle">RES Guard</text>
  <text x="702" y="189" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7a9a8a" text-anchor="middle">责任守卫</text>

  <!-- Down arrow -->
  <line x1="702" y1="202" x2="702" y2="220" stroke="#5a8a6a" stroke-width="0.8" marker-end="url(#arrowDownThin)"/>

  <!-- ACI -->
  <rect x="638" y="224" width="128" height="42" rx="4" ry="4" fill="#eaf0ea" stroke="#5a8a6a" stroke-width="1.2"/>
  <text x="702" y="242" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#5a8a6a" text-anchor="middle">ACI</text>
  <text x="702" y="257" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7a9a8a" text-anchor="middle">自主一致性</text>

  <!-- Down arrow -->
  <line x1="702" y1="270" x2="702" y2="288" stroke="#5a8a6a" stroke-width="0.8" marker-end="url(#arrowDownThin)"/>

  <!-- L8B -->
  <rect x="638" y="292" width="128" height="42" rx="4" ry="4" fill="#eaf0ea" stroke="#5a8a6a" stroke-width="1.2"/>
  <text x="702" y="310" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#5a8a6a" text-anchor="middle">L8B</text>
  <text x="702" y="325" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#7a9a8a" text-anchor="middle">分层基准</text>

  <!-- Bottom infra note -->
  <text x="702" y="365" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#6a8a9a" text-anchor="middle" font-style="italic">
    运维 · 校验 · 基准
  </text>
  <text x="702" y="378" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#6a8a9a" text-anchor="middle" font-style="italic">
    持续对齐保障
  </text>

  <!-- ============================================================ -->
  <!-- CROSS-LAYER ARROWS (Main ↔ Infrastructure) -->
  <!-- ============================================================ -->

  <!-- Layer 1 → Infrastructure (horizontal) -->
  <line x1="600" y1="94" x2="622" y2="130" stroke="#4a7ba7" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Layer 2 → Infrastructure (horizontal) -->
  <line x1="600" y1="270" x2="622" y2="260" stroke="#4a7ba7" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Layer 3 → Infrastructure (horizontal) -->
  <line x1="600" y1="446" x2="622" y2="390" stroke="#4a7ba7" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- DATA FLOW LEGEND at bottom -->
  <!-- ============================================================ -->
  <rect x="20" y="534" width="762" height="50" rx="4" ry="4" fill="none" stroke="#d0d8e0" stroke-width="0.8"/>

  <!-- Legend items -->
  <line x1="38" y1="558" x2="62" y2="558" stroke="#2c5f8a" stroke-width="1.2" marker-end="url(#arrowRight)"/>
  <text x="70" y="562" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a2a3a">层内数据流</text>

  <line x1="150" y1="558" x2="174" y2="558" stroke="#4a7ba7" stroke-width="1.2" marker-end="url(#arrowDownThin)"/>
  <text x="182" y="562" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a2a3a">层间数据流</text>

  <line x1="290" y1="558" x2="314" y2="558" stroke="#4a7ba7" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="322" y="562" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a2a3a">校验反馈流</text>

  <rect x="420" y="550" width="16" height="16" rx="2" ry="2" fill="#f0f4f8" stroke="#4a7ba7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="442" y="562" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a2a3a">系统层边界</text>

  <rect x="522" y="550" width="16" height="16" rx="2" ry="2" fill="#eaf0ea" stroke="#5a8a6a" stroke-width="1"/>
  <text x="544" y="562" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#1a2a3a">运维组件</text>

  <text x="660" y="562" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#8a9aaa" font-style="italic">
    图 1 — Vallace-LLM 三层系统架构
  </text>
</svg>